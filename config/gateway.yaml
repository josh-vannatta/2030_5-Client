# IEEE 2030.5 Gateway Configuration
#
# Secrets (sfdi, pin, cert path) can be overridden via environment variables:
#   GATEWAY_SFDI   — device SFDI
#   GATEWAY_PIN    — registration PIN
#   GATEWAY_CERT   — path to device certificate

device:
  # Short-Form Device Identifier (last 5 digits of SHA-256 of LFDI)
  sfdi: "320841683177"
  # Path to device certificate (PEM format)
  cert: "config/certs/device.pem"
  # Directory containing trusted CA certificates
  ca_dir: "config/certs/ca/"
  # PIN for in-band registration (omit if using out-of-band)
  pin: "111115"

server:
  # Network interface to bind (e.g. eth0, en0)
  interface: "eth0"
  # 2030.5 server base URI
  uri: "https://192.168.1.100/sep2"
  # Startup command: register | all | metering | fsa
  command: "all"
  # DERControlList poll interval in seconds (default: 300)
  # Controls how frequently client_test re-fetches DERControlList from the server.
  # Other resources (FunctionSetAssignmentsList, DERProgramList, Time) use the
  # server's own pollRate field and are not affected by this setting.
  poll_rate: 300

protocol:
  # Field protocol: modbus | dnp3
  type: modbus

  modbus:
    host: "192.168.1.200"
    port: 502
    unit_id: 1
    timeout: 5.0

    # ── Control outputs (holding registers — written on DERControl events) ──
    registers:
      active_power: 40100    # opModFixedW / opModTargetW  (signed %)
      reactive_power: 40101  # opModFixedVar / opModTargetVar
      max_power_limit: 40102 # opModMaxLimW  (unsigned %)
      ramp_time: 40103       # rampTms  (1/100 s)
      connect: 40104         # opModConnect  (0=disconnect, 1=connect)
      energize: 40105        # opModEnergize (0=de-energize, 1=energize)

    # ── Telemetry inputs (read at startup to populate DER settings XML) ────
    # All addresses are optional — omit or comment out any register not wired.
    # Addresses below are examples; replace with your device's register map.
    reads:
      # Live status & availability
      inverter_status: 30201     # Inverter status code (see IEEE 2030.5 Table 10-6)
      gen_connect_status: 30202  # Generator connect status (0=disconnected, 1=connected)
      state_of_charge: 30200     # Battery SOC % (0–100; omit if no storage)
      available_w: 30203         # Available active power (W)
      available_var: 30204       # Available reactive power (VAR)
      # Static capability (read once; usually matches nameplate)
      rated_w: 30300             # Rated active power (W)
      rated_va: 30301            # Rated apparent power (VA)
      rated_ah: 30302            # Rated capacity (Ah; omit if no storage)
      # Operator limits
      max_w: 30303               # Max active power output (W)
      max_a: 30304               # Max current (A)

  # dnp3:
  #   host: "192.168.1.201"
  #   port: 20000
  #   master_address: 1
  #   outstation_address: 10

logging:
  level: INFO        # DEBUG | INFO | WARNING | ERROR
  format: text       # text | json
  # file: /var/log/gateway.log  # omit to log to stdout only

# ── Observability (OpenTelemetry) ──────────────────────────────────────────
#
# Requires the otel dependency group:
#   uv sync --group otel
#
# Telemetry is also auto-enabled (without changing this file) by setting
# OTEL_EXPORTER_OTLP_ENDPOINT in the environment.
#
# Standard OTel env vars are always honoured:
#   OTEL_SERVICE_NAME                        override the service name in Grafana
#   OTEL_EXPORTER_OTLP_ENDPOINT              base collector endpoint
#   OTEL_EXPORTER_OTLP_TRACES_ENDPOINT       per-signal override
#   OTEL_EXPORTER_OTLP_METRICS_ENDPOINT      per-signal override
#   OTEL_EXPORTER_OTLP_LOGS_ENDPOINT         per-signal override
#   OTEL_RESOURCE_ATTRIBUTES                 extra resource tags (key=value,...)
telemetry:
  # Set to true to activate traces, metrics, and structured log export.
  # When false (default) and OTEL_EXPORTER_OTLP_ENDPOINT is not set, the
  # gateway runs with zero OpenTelemetry overhead — no packages are loaded
  # and no network connections are attempted.
  enabled: false

  # Base OTLP/HTTP collector endpoint.
  # Signals are posted to: {endpoint}/v1/traces  /v1/metrics  /v1/logs
  # Omit (or leave commented) to use OTEL_EXPORTER_OTLP_ENDPOINT from the
  # environment, falling back to http://localhost:4318.
  # endpoint: http://otel-lgtm:4318
